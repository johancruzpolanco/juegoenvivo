<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ CANAL 7 🍋‍🟩 - RD vs Venezuela en Vivo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --main-color: #e31837;
            --parodiadera-color: #f7b731;
            --text-color: #e6edf3;
            --card-bg: #161b22;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 0; 
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            background-color: var(--bg-color);
        }

        #content-wrap {
            position: relative; 
            z-index: 1;
            width: 100%;
            max-width: 1200px; 
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--main-color); margin-bottom: 5px; font-size: 2.2em; text-align: center; }
        .subtitle { font-size: 1.1em; color: var(--parodiadera-color); margin-bottom: 25px; font-weight: 500; text-align: center; }
        #match-info { background-color: #000; color: white; padding: 10px 20px; border-radius: 4px; margin-bottom: 15px; text-align: center; font-weight: bold; border: 1px solid #30363d; }

        #app-container { display: flex; width: 100%; gap: 20px; flex-direction: column; }
        #player-panel { flex-grow: 3; order: 1; }
        #list-panel { flex-grow: 1; order: 2; min-width: 280px; }

        #stream-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #30363d;
        }

        .stream-item { padding: 12px 15px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background-color 0.2s ease; display: flex; align-items: center; }
        .stream-item:hover { background-color: #21262d; }
        .stream-item.active { background-color: var(--main-color); color: white; font-weight: bold; border-color: var(--main-color); }
        .stream-item-info { margin-left: 10px; }
        .stream-item-info strong { display: block; font-size: 1.1em; margin-bottom: 3px;}
        .stream-item-info span { font-size: 0.85em; color: #8b949e; }
        .stream-item.active .stream-item-info span { color: #ffe5e5; }

        #video-wrapper { position: relative; padding-top: 56.25%; height: 0; background-color: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); border: 1px solid #30363d; }
        #videoPlayer, #iframePlayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; border: none; }

        @media (min-width: 768px) { #app-container { flex-direction: row; } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div id="content-wrap">
    <h1>📺 CANAL 7 🍋‍🟩</h1>
    <p class="subtitle">Presenta: Rep. Dominicana vs. Venezuela en vivo.</p>

    <div id="app-container">
        <div id="list-panel">
            <div id="match-info">Seleccionando el mejor canal...</div>
            <ul id="stream-list"></ul>
        </div>

        <div id="player-panel">
            <div id="video-wrapper">
                <video id="videoPlayer" controls autoplay muted></video>
                <iframe id="iframePlayer" style="display:none;"></iframe>
            </div>
            <p style="text-align: center; margin-top: 15px; color: #8b949e; font-size: 0.9em; line-height: 1.5;">
                ⚠️ El video inicia silenciado (mutado). Toca el icono de volumen para escuchar.<br>
                Si un canal da error, intenta con otra opción de la lista. <br>
                <em>Soporte técnico: Pizza Jo / Hadid</em>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
// =====================================================================
// ENLACES CONFIGURADOS
// =====================================================================

const STREAM_LINKS = {
    "Teleantillas (RD)": "http://200.125.170.122:8000/play/a0cg/index.m3u8",
    "CDN Deportes (RD)": "http://200.125.170.122:8000/play/a03j/index.m3u8",
    "Telesistema (RD)": "http://200.125.170.122:8000/play/a0ci/index.m3u8",
    "Venevisión (VE)": "https://venevision-ioriver-cdn.encoders.immergo.tv/3/streamPlaylist.m3u8"
};

const PARTIDOS = [
    { 
        equipo1: "República Dominicana", 
        equipo2: "Venezuela", 
        estadio: "Clásico de Béisbol", 
        canales: [
            "Teleantillas (RD)", 
            "CDN Deportes (RD)",
            "Telesistema (RD)",
            "Venevisión (VE)"
        ] 
    }
];

const video = document.getElementById('videoPlayer');
const iframe = document.getElementById('iframePlayer');
const streamListContainer = document.getElementById('stream-list');
const matchInfo = document.getElementById('match-info');
let hlsInstance = null;
const DEFAULT_CHANNEL_NAME = "Teleantillas (RD)";

function stopPlayer() {
    video.pause();
    video.style.display = 'block';
    iframe.style.display = 'none';
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.src = '';
    iframe.src = '';
}

function loadStream(streamUrl, channelName, element) {
    stopPlayer();
    
    // Quitar clase activa a todos
    document.querySelectorAll('.stream-item').forEach(item => item.classList.remove('active'));
    if (element) element.classList.add('active');
    
    matchInfo.innerHTML = `Reproduciendo: <strong>${channelName}</strong>`;

    if (streamUrl === "iframe") {
        video.style.display = 'none';
        iframe.style.display = 'block';
        iframe.src = "https://telemicro.com.do/players/15tv/";
    } else if (Hls.isSupported()) {
        hlsInstance = new Hls({
            debug: false,
            enableWorker: true
        });
        hlsInstance.loadSource(streamUrl);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
        
        // Manejador de errores amigable
        hlsInstance.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.error("Error de red, intentando recuperar...");
                        hlsInstance.startLoad();
                        matchInfo.innerHTML = `❌ Error de red en <strong>${channelName}</strong>. El servidor bloquea el acceso o está caído. Intenta otro canal.`;
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.error("Error multimedia, intentando recuperar...");
                        hlsInstance.recoverMediaError();
                        break;
                    default:
                        stopPlayer();
                        matchInfo.innerHTML = `❌ Error irrecuperable en <strong>${channelName}</strong>. Selecciona otro.`;
                        break;
                }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Para usuarios de Safari/iOS
        video.src = streamUrl;
        video.addEventListener('loadedmetadata', () => video.play().catch(()=>{}), { once:true });
        video.addEventListener('error', () => {
             matchInfo.innerHTML = `❌ El formato no es compatible o el servidor falló en <strong>${channelName}</strong>.`;
        });
    } else {
        matchInfo.innerHTML = '❌ Tu navegador no soporta HLS.';
    }
}

function buildStreamList() {
    let defaultElementToHighlight = null;
    
    PARTIDOS.forEach(partido => {
        // Título del Partido
        const partidoTitle = document.createElement('li');
        partidoTitle.className = 'stream-item';
        partidoTitle.style.backgroundColor = '#21262d';
        partidoTitle.style.cursor = 'default';
        partidoTitle.style.color = 'var(--text-color)';
        partidoTitle.innerHTML = `<div class="stream-item-info" style="margin-left: 0;"><strong>${partido.equipo1} vs. ${partido.equipo2}</strong><span>📍 ${partido.estadio}</span></div>`;
        streamListContainer.appendChild(partidoTitle);

        // Canales
        partido.canales.forEach(canal => {
            const streamUrl = STREAM_LINKS[canal];
            if (!streamUrl) return;
            
            const listItem = document.createElement('li');
            listItem.className = 'stream-item';
            
            let countryIcon = "📺";
            if(canal.includes("(RD)")) countryIcon = "🇩🇴";
            if(canal.includes("(VE)")) countryIcon = "🇻🇪";

            listItem.innerHTML = `<span style="font-size:1.5em;color:var(--main-color);">${countryIcon}</span><div class="stream-item-info"><strong>${canal}</strong><span>Haga clic para ver</span></div>`;
            listItem.addEventListener('click', () => loadStream(streamUrl, canal, listItem));
            
            streamListContainer.appendChild(listItem);
            
            if (canal === DEFAULT_CHANNEL_NAME) defaultElementToHighlight = listItem;
        });
    });

    // Cargar canal por defecto
    const defaultUrl = STREAM_LINKS[DEFAULT_CHANNEL_NAME];
    if (defaultUrl) {
        setTimeout(() => loadStream(defaultUrl, DEFAULT_CHANNEL_NAME, defaultElementToHighlight), 100);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    buildStreamList();
    
    // Configuración de fondo animado (Partículas)
    particlesJS('particles-js', {
        "particles": {
            "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": ["#e31837","#f7b731","#e6edf3"] },
            "shape": { "type":"circle" },
            "opacity": { "value":0.4 },
            "size": { "value":3,"random":true },
            "line_linked": { "enable":true,"distance":150,"color":"#21262d","opacity":0.4,"width":1 },
            "move": { "enable":true,"speed":4,"direction":"none","random":false,"straight":false,"out_mode":"out","bounce":false }
        },
        "interactivity": { "detect_on":"canvas", "events": { "onhover":{"enable":false},"onclick":{"enable":false}, "resize":true } },
        "retina_detect": true
    });
});
</script>

</body>
</html>
